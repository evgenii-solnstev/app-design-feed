<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px 20px;
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 12px;
      color: #333;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 600;
    }
    p {
      margin: 0 0 16px;
      color: #666;
      line-height: 1.4;
    }
    button {
      width: 100%;
      padding: 10px 14px;
      background: #0d99ff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #0b85e0; }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .message {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
    }
    .message.success { background: #e6f4ea; color: #137333; }
    .message.error { background: #fce8e6; color: #c5221f; }
  </style>
</head>
<body>
  <h2>Design Feed</h2>
  <p>Поделись апдейтом с командой. Фрагмент решения появится в ленте.</p>
  <button type="button" id="submit">Поделиться в ленте</button>
  <div id="message" class="message" style="display: none;"></div>
  <script>
    const API_BASE = 'https://app-design-feed.vercel.app';
    const submitBtn = document.getElementById('submit');
    const messageEl = document.getElementById('message');

    function showMessage(text, isError) {
      messageEl.textContent = text;
      messageEl.className = 'message ' + (isError ? 'error' : 'success');
      messageEl.style.display = 'block';
    }

    function hideMessage() {
      messageEl.style.display = 'none';
    }

    parent.postMessage({ pluginMessage: { type: 'get-context' } }, '*');

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'context') {
        if (!msg.hasSelection) {
          showMessage('Выберите фрейм на холсте.', true);
        } else {
          hideMessage();
        }
      }
      if (msg.type === 'exported') {
        const { bytes, authorName, figmaUrl } = msg;
        submitBtn.disabled = true;
        submitBtn.textContent = 'Отправка…';
        const blob = new Blob([new Uint8Array(bytes)], { type: 'image/png' });
        const formData = new FormData();
        formData.append('file', blob, 'frame.png');
        formData.append('authorName', authorName);
        if (figmaUrl) formData.append('figmaUrl', figmaUrl);

        fetch(API_BASE + '/api/frames', {
          method: 'POST',
          body: formData,
        })
          .then((res) => {
            if (!res.ok) return res.json().then((d) => Promise.reject(new Error(d.error || res.statusText)));
            return res.json();
          })
          .then(() => {
            showMessage('Добавлено в ленту.', false);
            submitBtn.disabled = false;
            submitBtn.textContent = 'Поделиться в ленте';
          })
          .catch((err) => {
            showMessage(err.message || 'Ошибка отправки.', true);
            submitBtn.disabled = false;
            submitBtn.textContent = 'Поделиться в ленте';
          });
      }
      if (msg.type === 'result' && !msg.success) {
        showMessage(msg.error || 'Ошибка.', true);
      }
    };

    submitBtn.addEventListener('click', () => {
      hideMessage();
      parent.postMessage({ pluginMessage: { type: 'export' } }, '*');
    });
  </script>
</body>
</html>
